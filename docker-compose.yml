version: '3.8'

# Banco de dados: MongoDB Atlas (nuvem). Não há mais serviço de Mongo local.
# A string de conexão padrão está em backend/src/main/resources/application.yml
# e pode ser sobrescrita aqui pela variável MONGO_URI.

services:
  backend:
    build: ./backend
    container_name: estudos-backend
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb+srv://jdavidjl97_db_user:6nWHwIqhNfq6cpTP@cluster0.frz73kr.mongodb.net/estudos_db?retryWrites=true&w=majority&appName=Cluster0
    ports:
      - "8080:8080"
    networks:
      - estudos-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080
    container_name: estudos-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - estudos-net

networks:
  estudos-net:
    driver: bridge
